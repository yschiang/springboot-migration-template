# database init, supports mysql too
database=h2
spring.sql.init.schema-locations=classpath*:db/${database}/schema.sql
spring.sql.init.data-locations=classpath*:db/${database}/data.sql

# Web
spring.thymeleaf.mode=HTML

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.use-new-id-generator-mappings=true

# Internationalization
spring.messages.basename=messages/messages

# Redis (old property namespace - should be spring.data.redis.* in SB3)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# Server
server.port=8080
server.max.http.header.size=65536

# Actuator
management.endpoints.web.exposure.include=*

# Metrics export (old property path - should be management.prometheus.metrics.export.* in SB3)
management.metrics.export.prometheus.enabled=true
management.metrics.export.prometheus.step=1m

# Logging
logging.level.org.springframework=INFO

# Maximum time static resources should be cached
spring.web.resources.cache.cachecontrol.max-age=12h

# PetClinic custom properties
petclinic.clinic-name=Spring PetClinic
petclinic.max-visits-per-day=50
petclinic.enable-notifications=true
