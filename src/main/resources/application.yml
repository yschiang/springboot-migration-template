server:
  port: 8080

spring:
  application:
    name: demo

  mvc:
    pathmatch:
      # BROKEN: these properties were removed in Spring Boot 3.0
      # spring.mvc.pathmatch.use-suffix-pattern is no longer supported
      use-suffix-pattern: true
      use-registered-suffix-pattern: true

  # BROKEN: spring.redis.* was renamed to spring.data.redis.* in Spring Boot 3.x
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  # BROKEN: management.metrics.export.* was reorganised in Spring Boot 3 / Micrometer 1.10
  # Correct key is: management.prometheus.metrics.export.enabled
  metrics:
    export:
      prometheus:
        enabled: true
        step: 1m
